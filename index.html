<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZYZARUS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="xp-desktop">
    <!-- Logon Screen -->
    <div id="setup-screen" class="window">
        <div class="title-bar">
            <div class="title-bar-text">ZYZARUS</div>
        </div>
        <div class="window-body" style="text-align: center; padding: 30px;">
            <h1 style="color: #003399; font-size: 42px; margin: 0 0 20px 0; letter-spacing: 5px;">ZYZARUS</h1>
            <input type="text" id="room-input" placeholder="ROOM ID" maxlength="4" style="font-size: 20px; width: 120px; text-align: center; border: 2px inset #888; padding: 5px;">
            <div style="margin-top: 20px;">
                <button id="join-btn" style="width: 100px; height: 30px; font-weight: bold;">Login</button>
            </div>
        </div>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="window" style="display:none;">
        <div class="title-bar">
            <div class="title-bar-text">ZYZARUS</div>
            <div class="title-bar-controls"><button aria-label="Close" onclick="location.reload()"></button></div>
        </div>
        <div class="window-body">
            <div id="ui-layer">
                <div class="status-panel">YOU: <span class="life-count">3</span></div>
                <div id="status-msg">CONNECTED</div>
                <div class="status-panel">ENEMY: <span class="life-count">3</span></div>
            </div>

            <fieldset><legend>POOL</legend><div id="card-pool" class="pool-container"></div></fieldset>
            <fieldset><legend>FORMATION</legend><div id="player-slots" class="slots">
                <div class="slot" data-idx="0"></div><div class="slot" data-idx="1"></div>
                <div class="slot" data-idx="2"></div><div class="slot" data-idx="3"></div>
            </div></fieldset>

            <div class="button-row"><button id="battle-btn" disabled>SET FORMATION</button></div>

            <div class="chat-container" style="border: 1px solid #919B9C; background: #fff;">
                <div id="chat-logs" style="height: 60px; overflow-y: scroll; padding: 5px; font-size: 11px;"></div>
                <div style="display: flex; border-top: 1px solid #919B9C;">
                    <input type="text" id="chat-input" style="flex:1; border:none; padding:4px;">
                    <button id="chat-send" style="border:none; border-left:1px solid #919B9C; border-radius:0;">Send</button>
                </div>
            </div>
        </div>
    </div>
</div>
<script type="module" src="cdgm.js"></script>
</body>
</html>
