<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZYZARUS</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* iOSでの入力時ズームを防止し、XPの質感を維持するための追加スタイル */
        input[type="text"], input[type="number"] {
            font-size: 16px !important; /* iOS Safariの自動ズーム防止 */
            font-family: "Tahoma", sans-serif;
        }
        
        /* タイトルバーの最小高さを確保 */
        .title-bar {
            min-height: 30px;
        }

        /* ZYZARUSロゴのタイポグラフィ */
        .logo-text {
            color: #003399;
            font-size: 48px;
            margin: 20px 0;
            letter-spacing: 8px;
            font-weight: 900;
            text-shadow: 2px 2px #fff, 4px 4px rgba(0,0,0,0.1);
            font-style: italic;
        }
    </style>
</head>
<body>

<div id="xp-desktop">
    
    <!-- 1. ログイン（入室）画面 -->
    <div id="setup-screen" class="window">
        <div class="title-bar">
            <div class="title-bar-text">ZYZARUS - Logon</div>
        </div>
        <div class="window-body" style="text-align: center; padding: 20px;">
            <div class="logo-text">ZYZARUS</div>
            <p style="margin-bottom: 15px; font-size: 14px;">4桁のルームIDを入力してください</p>
            
            <div class="input-row" style="margin-bottom: 20px;">
                <input type="text" id="room-input" 
                       placeholder="0000" 
                       maxlength="4" 
                       inputmode="numeric" 
                       pattern="[0-9]*"
                       style="width: 120px; height: 35px; text-align: center; border: 2px inset #fff; background: #fff;">
            </div>

            <div class="button-row">
                <button id="join-btn" style="padding: 5px 20px; font-weight: bold; min-width: 100px;">Login</button>
            </div>
        </div>
        <div class="status-bar">
            <p class="status-bar-field">Ready</p>
        </div>
    </div>

    <!-- 2. ゲームメイン画面 -->
    <div id="game-screen" class="window" style="display:none;">
        <div class="title-bar">
            <div class="title-bar-text">ZYZARUS</div>
            <div class="title-bar-controls">
                <button aria-label="Close" onclick="location.reload()"></button>
            </div>
        </div>

        <div class="window-body">
            <!-- ライフ・ステータスエリア -->
            <div id="ui-layer" style="display: flex; justify-content: space-between; align-items: center; background: #d6d3c2; padding: 5px; border: 1px inset #fff; margin-bottom: 10px;">
                <div class="status-panel" style="text-align: left;">
                    <div style="font-size: 10px;">PLAYER</div>
                    <strong>HP: <span class="life-count">3</span></strong>
                </div>
                <div id="status-msg" style="font-size: 12px; font-weight: bold; color: #003399;">CONNECTED</div>
                <div class="status-panel" style="text-align: right;">
                    <div style="font-size: 10px;">ENEMY</div>
                    <strong>HP: <span class="life-count">3</span></strong>
                </div>
            </div>

            <div id="game-board">
                <!-- カードプール -->
                <fieldset style="margin-bottom: 10px; border: 1px solid #919B9C; background: #f4f3ee;">
                    <legend style="font-size: 11px; padding: 0 5px;">POOL</legend>
                    <div id="card-pool" class="pool-container" style="min-height: 105px;"></div>
                </fieldset>

                <!-- 自分の布陣 -->
                <fieldset style="margin-bottom: 15px; border: 1px solid #919B9C; background: #f4f3ee;">
                    <legend style="font-size: 11px; padding: 0 5px;">FORMATION</legend>
                    <div id="player-slots" class="slots" style="min-height: 105px;">
                        <div class="slot" data-idx="0"></div>
                        <div class="slot" data-idx="1"></div>
                        <div class="slot" data-idx="2"></div>
                        <div class="slot" data-idx="3"></div>
                    </div>
                </fieldset>

                <!-- 決定ボタン -->
                <div class="button-row" style="margin-bottom: 15px;">
                    <button id="battle-btn" disabled style="width: 100%; height: 40px; font-size: 16px; font-weight: bold; color: #d00;">SET FORMATION</button>
                </div>
            </div>

            <!-- チャットエリア -->
            <div class="chat-container" style="border: 1px solid #919B9C; background: #fff; overflow: hidden;">
                <div style="background: #E0DFE3; font-size: 10px; padding: 2px 5px; border-bottom: 1px solid #919B9C;">MESSENGER</div>
                <div id="chat-logs" style="height: 60px; overflow-y: scroll; padding: 5px; font-size: 11px; color: #000; background: #fff;"></div>
                <div class="chat-input-group" style="display: flex; border-top: 1px solid #919B9C;">
                    <input type="text" id="chat-input" placeholder="Message..." style="flex: 1; border: none; padding: 5px; outline: none;">
                    <button id="chat-send" style="border: none; border-left: 1px solid #919B9C; border-radius: 0; background: #ece9d8; padding: 0 10px;">Send</button>
                </div>
            </div>
        </div>

        <div class="status-bar">
            <p class="status-bar-field">ZYZARUS Network: Online</p>
            <p class="status-bar-field" id="my-role-display">Searching...</p>
        </div>
    </div>

</div>

<!-- Firebaseモジュールの読み込み -->
<script type="module" src="cdgm.js"></script>

</body>
</html>
